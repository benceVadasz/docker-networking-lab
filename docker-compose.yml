services:
  frontend:
    build:
      context: frontend
    stdin_open: true
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
    restart: always
    networks:
      - private
    depends_on:
      - backend

  backend:
    restart: always
    build:
      context: backend
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - postgres
    networks:
      - private

  postgres:
    restart: always
    image: postgres:15
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    networks:
      - private
    expose:
      - 5432

  proxy:
    image: nginx
    volumes:
      - type: bind
        source: ./proxy/nginx.conf
        target: /etc/nginx/conf.d/default.conf
        read_only: true
    ports:
      - 80:80
    networks:
      - public
      - private
    depends_on:
      - backend
      - frontend
    expose:
      - 3000
networks:
  test:
  public:
    ipam:
      config:
        - subnet: 10.0.1.0/24
  private:
    internal: true
    ipam:
      config:
        - subnet: 10.0.0.0/24

volumes:
  postgres_data:
