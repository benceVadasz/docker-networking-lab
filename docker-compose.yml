services:
  frontend:
    build:
      context: frontend
    stdin_open: true
    restart: always
    networks:
      - private
    depends_on:
      backend:
        condition: service_healthy

  backend:
    restart: always
    build:
      context: backend
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - private
    healthcheck:
      test: ["CMD", "node", "healthcheck.js"]
      interval: 3s
      timeout: 3s
      start_period: 0s
      retries: 5

  postgres:
    restart: always
    image: postgres:15
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    networks:
      - private
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 3s
      timeout: 3s
      start_period: 0s
      retries: 5

  proxy:
    image: nginx
    volumes:
      - type: bind
        source: ./proxy/nginx.conf
        target: /etc/nginx/conf.d/default.conf
        read_only: true
    ports:
      - 80:80
    networks:
      - public
      - private
    depends_on:
      - backend
      - frontend
networks:
  public:
    ipam:
      config:
        - subnet: 10.0.1.0/24
  private:
    internal: true
    ipam:
      config:
        - subnet: 10.0.0.0/24

volumes:
  postgres_data:
